api:
  dashboard: true
  insecure: true # Nur für Homelab, entferne in Produktion

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false

certificatesResolvers:
  letsencrypt:
    acme:
      email: deine-email@example.com # Ersetze mit deiner E-Mail
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web
